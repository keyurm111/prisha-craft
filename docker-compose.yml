services:
  server:
    build:
      context: ./server
      target: production
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:5174}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
    ports:
      - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"
    volumes:
      - ./server/public/uploads:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const port=process.env.PORT||5000;http.get({host:'127.0.0.1',port,path:'/'},res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - prisha-crafts-network

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://server:5000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-5000}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-5173}:80"
    networks:
      - prisha-crafts-network

  admin:
    build:
      context: ./admin
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://server:5000}
    restart: unless-stopped
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-5000}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-5174}:80"
    networks:
      - prisha-crafts-network

networks:
  prisha-crafts-network:
    driver: bridge
